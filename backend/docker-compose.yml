services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_OWNER_USER:-dashboarduz_owner}
      POSTGRES_PASSWORD: ${POSTGRES_OWNER_PASSWORD:-owner_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-dashboarduz}
    ports:
      - "5432:5432"
    volumes:
      - dashboarduz_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # S3-compatible object storage for call recordings (see app/core/storage.py).
  # No healthcheck: the minio/minio image ships neither curl nor mc, so a
  # reliable CMD-SHELL probe needs a separate image -- not worth it for dev.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - dashboarduz_minio_data:/data

  # Ephemeral OTP/password-reset/registration-code storage (see
  # app/core/redis_client.py) -- TTL-based expiry, no durability needed, so
  # no volume mount. DB index 1 (not 0) in case a shared box's default DB is
  # used by something else -- matches the VPS's own additive-only convention.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dashboarduz_postgres_data:
  dashboarduz_minio_data:
