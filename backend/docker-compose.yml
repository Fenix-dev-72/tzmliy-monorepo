services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_OWNER_USER:-dashboarduz_owner}
      POSTGRES_PASSWORD: ${POSTGRES_OWNER_PASSWORD:-owner_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-dashboarduz}
    ports:
      # 5432 is taken on this host by an unrelated project's own container.
      - "5433:5432"
    volumes:
      - dashboarduz_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - dashboarduz_minio_data:/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      # 6379 is taken on this host by an unrelated project's own container.
      - "6380:6379"
    volumes:
      - dashboarduz_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - dashboarduz_prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    depends_on:
      - app

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      # 3000 is taken on this host by an unrelated project's own container.
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - dashboarduz_grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  app:
    build: .
    restart: unless-stopped
    ports:
      # 8000 is taken on this host by an unrelated project's own container.
      - "8010:8000"
    env_file:
      - .env
    environment:
      # Inside the compose network services reach each other by service
      # name, not localhost -- override the host part of the .env DSNs.
      MIGRATIONS_DATABASE_URL: postgresql://${POSTGRES_OWNER_USER:-dashboarduz_owner}:${POSTGRES_OWNER_PASSWORD:-owner_dev_password}@postgres:5432/${POSTGRES_DB:-dashboarduz}
      DATABASE_URL: postgresql://app_user:${APP_DB_PASSWORD:-app_user_dev_password}@postgres:5432/${POSTGRES_DB:-dashboarduz}
      REDIS_URL: redis://redis:6379/1
      OBJECT_STORAGE_ENDPOINT_URL: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  frontend:
    build: ../frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      # Runs in the browser, so it must point at the app's host-published
      # port, not the in-network service name.
      VITE_API_BASE_URL: http://localhost:8010
    volumes:
      - ../frontend/src:/app/src
    depends_on:
      - app

volumes:
  dashboarduz_postgres_data:
  dashboarduz_minio_data:
  dashboarduz_redis_data:
  dashboarduz_prometheus_data:
  dashboarduz_grafana_data:
