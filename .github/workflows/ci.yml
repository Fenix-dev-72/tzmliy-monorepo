name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-check:
    name: Frontend - TypeCheck & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc -b

      - name: Build production bundle
        run: npm run build

  backend-check:
    name: Backend - Syntax & Import Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax
        run: |
          python -m compileall -q app/

      - name: Verify main module imports
        run: |
          python -c "from app.main import app; print('Main module imported successfully')"

      - name: Check for common issues
        run: |
          python -c "
          import ast
          import sys
          from pathlib import Path

          errors = []
          for py_file in Path('app').rglob('*.py'):
              try:
                  ast.parse(py_file.read_text())
              except SyntaxError as e:
                  errors.append(f'{py_file}: {e}')

          if errors:
              print('Syntax errors found:')
              for err in errors:
                  print(f'  {err}')
              sys.exit(1)
          print('All Python files have valid syntax')
          "

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [frontend-check, backend-check]
    if: always()

    steps:
      - name: Check results
        run: |
          if [ "${{ needs.frontend-check.result }}" != "success" ] || [ "${{ needs.backend-check.result }}" != "success" ]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi
          echo "All CI checks passed!"
